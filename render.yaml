services:
  - type: web
    name: cotacoes-online
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cotacoes-online-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"

databases:
  - name: cotacoes-online-db
    plan: free
    region: ohio
    databaseName: cotacoes_online
    user: cotacoes_user
    postgresMajorVersion: "18"
